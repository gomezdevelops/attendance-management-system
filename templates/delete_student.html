{% extends "base.html" %}

{% block content %}

<h2>Delete Student</h2>

<form method="POST">

<label>Select Student</label>

<select name="student_id" required>

{% for student in students %}

<option value="{{ student[0] }}">
{{ student[0] }} — {{ student[1] }}
</option>

{% endfor %}

</select>

<button type="submit"
class="danger">
Delete Student
</button>

</form>

{% endblock %}
