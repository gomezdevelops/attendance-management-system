{% extends "base.html" %}

{% block content %}

<h2>Start Attendance</h2>

<form method="POST">

<label>Select Subject</label>

<select name="subject_id" required>

{% for subject in subjects %}

<option value="{{ subject[0] }}">
{{ subject[1] }}
</option>

{% endfor %}

</select>

<button type="submit">
Start Attendance
</button>

</form>

<a href="/dashboard">
<button class="secondary">
Back to Dashboard
</button>
</a>

{% endblock %}
